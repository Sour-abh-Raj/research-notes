site_name: Research Blog — Sourabh Raj
site_description: A place where I document my research, my studies, my findings, and my thoughts.
site_url: https://sour-abh-raj.github.io/research-blog/
site_author: Sourabh Raj
copyright: Copyright &copy; 2026 Sourabh Raj

repo_url: https://github.com/Sour-abh-Raj/research-blog
repo_name: Sour-abh-Raj/research-blog

theme:
  name: material
  language: en
  custom_dir: overrides
  icon:
    logo: material/school
  favicon: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Merriweather
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tooltips

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Sour-abh-Raj
      name: GitHub
    - icon: fontawesome/solid/envelope
      link: mailto:1582003sourabh@gmail.com
      name: Email
  generator: false

plugins:
  - search
  - blog:
      blog_dir: blog
      blog_toc: true
      post_date_format: long
      post_url_format: "{date}/{slug}"
      archive: true
      archive_name: Archive
      categories: true
      categories_name: Categories
  - tags

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - footnotes
  - toc:
      permalink: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Blog:
    - blog/index.md
  - Thoughts:
    - thoughts/index.md
    - 'Thought #001 — Social Reproduction of Corruption': thoughts/thought-001-corruption-socialization-loop.md
    - 'Thought #002 — Adverse Selection in Bureaucracy': thoughts/thought-002-adverse-selection-bureaucracy.md
  - Library: library.md
  - Topics: tags.md
  - About: about.md
